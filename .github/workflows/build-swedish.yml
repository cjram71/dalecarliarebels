name: Build Swedish Dalecarlia Rebels site

on:
  push:
    branches:
      - main
    paths:
      - .site-build/trigger

permissions:
  contents: write

jobs:
  build-swedish-site:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Swedish repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Rebuild translation script
        run: cat .site-build/translate/part-* | base64 --decode | gzip --decompress > /tmp/translate.py

      - name: Copy current English website
        run: |
          git clone --depth 1 https://github.com/cjram71/dalecarliarebel.git /tmp/english-site
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          rsync -a --exclude='.git' --exclude='.github' /tmp/english-site/ ./

      - name: Translate and configure Swedish site
        run: python /tmp/translate.py .

      - name: Validate required files
        run: |
          test -f index.html
          test -f join.html
          test -f youth.html
          test -f season.html
          test -f story.html
          test -f partners.html
          test -f news.html
          test -f contact.html
          test -f privacy.html
          test -f 404.html
          test -f styles.css
          test -f script.js
          test -f assets/rebels-logo-small.webp
          test -f assets/rebels-game-small.webp
          grep -q '<html lang="sv">' index.html
          grep -q 'dalecarliarebels.se' CNAME
          ! grep -R 'hero-logo-card' index.html

      - name: Commit completed Swedish website
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build complete Swedish Dalecarlia Rebels website"
          git push origin main

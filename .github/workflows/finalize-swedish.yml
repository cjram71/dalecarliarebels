name: Finalize Swedish site

on:
  push:
    branches: [main]
    paths: [.site-fix/trigger]

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - run: cp .site-fix/fix.py /tmp/fix.py
      - run: python /tmp/fix.py .
      - name: Validate Swedish site
        run: |
          grep -q '<html lang="sv">' index.html
          grep -q 'alternateName' index.html
          ! grep -R 'alternateNamn' --include='*.html' .
          ! grep -R '>24–26 July<' --include='*.html' .
          ! grep -R '>31 July–2 August<' --include='*.html' .
          ! grep -R '>22 August<' --include='*.html' .
          ! grep -R 'Diagram reading every strength has a position' --include='*.html' .
          ! grep -R 'hero-logo-card' index.html
          test "$(cat CNAME)" = "dalecarliarebels.se"
      - run: rm -rf .site-fix .github/workflows/finalize-swedish.yml
      - name: Commit final Swedish corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize Swedish translation and language links"
          git push origin main
